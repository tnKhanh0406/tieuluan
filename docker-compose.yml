services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: user_service_db
      MYSQL_USER: user
      MYSQL_PASSWORD: userpass
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - mysql_data_v2:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -u root -prootpass']
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - ecommerce-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ecommerce_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ecommerce_db']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce-net

  user-service:
    build: ./user-service
    command: sh -c "python manage.py migrate ; python manage.py runserver 0.0.0.0:8000"
    environment:
      ALLOWED_HOSTS: '*'
      MYSQL_DB: user_service_db
      MYSQL_USER: user
      MYSQL_PASSWORD: userpass
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - '8001:8000'
    networks:
      - ecommerce-net

  product-service:
    build: ./product-service
    command: sh -c "python manage.py migrate ; python manage.py runserver 0.0.0.0:8000"
    environment:
      POSTGRES_DB: product_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      ALLOWED_HOSTS: '*'
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8002:8000'
    networks:
      - ecommerce-net

  cart-service:
    build: ./cart-service
    command: sh -c "python manage.py migrate ; python manage.py runserver 0.0.0.0:8000"
    environment:
      ALLOWED_HOSTS: '*'
      POSTGRES_DB: cart_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8003:8000'
    networks:
      - ecommerce-net

  order-service:
    build: ./order-service
    command: sh -c "python manage.py migrate ; python manage.py runserver 0.0.0.0:8000"
    environment:
      ALLOWED_HOSTS: '*'
      POSTGRES_DB: order_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      CART_SERVICE_URL: http://cart-service:8000
      PAYMENT_SERVICE_URL: http://payment-service:8000
      SHIPPING_SERVICE_URL: http://shipping-service:8000
      PRODUCT_SERVICE_URL: http://product-service:8000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8004:8000'
    networks:
      - ecommerce-net

  payment-service:
    build: ./payment-service
    command: sh -c "python manage.py migrate ; python manage.py runserver 0.0.0.0:8000"
    environment:
      ALLOWED_HOSTS: '*'
      POSTGRES_DB: payment_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8005:8000'
    networks:
      - ecommerce-net

  shipping-service:
    build: ./shipping-service
    command: sh -c "python manage.py migrate ; python manage.py runserver 0.0.0.0:8000"
    environment:
      ALLOWED_HOSTS: '*'
      POSTGRES_DB: shipping_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8006:8000'
    networks:
      - ecommerce-net

  neo4j:
    image: neo4j:5.25
    environment:
      NEO4J_AUTH: neo4j/neo4jpass
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
    volumes:
      - neo4j_data:/data
    ports:
      - '7474:7474'
      - '7687:7687'
    networks:
      - ecommerce-net

  ai-service:
    build: ./ai-service
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      PRODUCT_SERVICE_URL: http://product-service:8000
      BEHAVIOR_CSV: /data/user_behavior.csv
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4jpass
    volumes:
      - ./user_behavior.csv:/data/user_behavior.csv:ro
    depends_on:
      - product-service
      - neo4j
    ports:
      - '8010:8000'
    networks:
      - ecommerce-net

  api-gateway:
    build: ./api-gateway
    depends_on:
      - user-service
      - product-service
      - cart-service
      - order-service
      - payment-service
      - shipping-service
      - ai-service
    ports:
      - '8088:80'
    networks:
      - ecommerce-net

volumes:
  postgres_data:
  mysql_data:
  mysql_data_v2:
  neo4j_data:

networks:
  ecommerce-net:
    driver: bridge
